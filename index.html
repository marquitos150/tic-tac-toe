<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTacToe</title>
    <link rel="stylesheet" href="styles.css">
    <link href='http://fonts.googleapis.com/css?family=Roboto:500,700' rel='stylesheet' type='text/css'>
</head>
<body>
    <header>
        <h1><span class="neon">NEON</span> <span class="tictactoe">TIC-TAC-TOE</span></h1>
    </header>
    <main>
        <div class="score-board">
            <div class="left-side">
                <svg class="neon-O" viewBox="0 0 10 10">
                    <circle cx="5" cy="5" r="2.5"/>
                </svg>
                <div class="player-score-tab">
                    <p id="player1" class="player-name">John</p>
                    <p id="left-score" class="score">0</p>
                </div>
            </div>
            <div class="ties">
                <p>Ties</p>
                <p id="ties-score" class="score">0</p>
            </div>
            <div class="right-side">
                <div class="player-score-tab">
                    <p id="right-score" class="score">0</p>
                    <p id="player2" class="player-name">Stewart</p>
                </div>
                <svg class="neon-X" viewBox="0 0 10 10">
                    <line x1="2.5" y1="2.5" x2="7.5" y2="7.5" /> 
                    <line x1="7.5" y1="2.5" x2="2.5" y2="7.5" />
                </svg>
            </div>
        </div>
        <div class="game-content">
            <div class="game-board">
                <button id="cell00" class="cell"></button>
                <button id="cell01" class="cell"></button>
                <button id="cell02" class="cell"></button>
                <button id="cell10" class="cell"></button>
                <button id="cell11" class="cell"></button>
                <button id="cell12" class="cell"></button>
                <button id="cell20" class="cell"></button>
                <button id="cell21" class="cell"></button>
                <button id="cell22" class="cell"></button>
            </div>
            <div class="game-window">
                <div class="game-menu active">
                    <h1>Game Menu</h1>
                    <form>
                        <label for="player1-name">Player 1 Name:</label>
                        <input type="text" id="player1-name" name="player1-name">
                        <label for="player2-name">Player 2 Name:</label>
                        <input type="text" id="player2-name" name="player2-name">
                        <button type="submit">PLAY</button>
                    </form>
                </div>
                <div class="interactive-logs">
                    <!-- Dynamically add logs and interactive elements based on user actions -->
                </div>
            </div>
        </div>
    </main>
    <footer>
        Copyright © Marcos Vazquez 2026
    </footer>
    <script src="tic-tac-toe.js"></script>
</body>
</html>
