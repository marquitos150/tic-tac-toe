<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg" href="assets/tic-tac-toe-icon.svg">
    <title>Neon Tic-Tac-Toe</title>
    <link rel="stylesheet" href="styles.css">
    <link href='http://fonts.googleapis.com/css?family=Roboto:500,700' rel='stylesheet' type='text/css'>
</head>
<body>
    <header>
        <h1><span class="neon">NEON</span> <span class="tictactoe">TIC-TAC-TOE</span></h1>
        <a class="github-repo-link" href="https://github.com/marquitos150/tic-tac-toe">
            <img src="assets/github-white-icon.svg" alt="GitHub Repo" class="github-icon">
            <p>GitHub</p>
        </a>
    </header>
    <main>
        <div class="score-board">
            <div class="player left">
                <svg class="singular-neon-O" viewBox="0 0 10 10">
                    <circle cx="5" cy="5" r="2.5"/>
                </svg>
                <span id="playerO" class="player-name">Player O</span>
                <span id="left-score" class="score">0</span>
            </div>
            <div class="ties">
                <p>Ties</p>
                <p id="ties-score" class="score">0</p>
            </div>
            <div class="player right">
                <span id="right-score" class="score">0</span>
                <span id="playerX" class="player-name">Player X</span>
                <svg class="singular-neon-X" viewBox="0 0 10 10">
                    <line x1="2.5" y1="2.5" x2="7.5" y2="7.5" /> 
                    <line x1="7.5" y1="2.5" x2="2.5" y2="7.5" />
                </svg>
            </div>
        </div>
        <div class="game-content">
            <div class="game-board">
                <svg class="dividers" viewBox="0 0 340 340">
                    <line x1="110" y1="10" x2="110" y2="330" />
                    <line x1="230" y1="10" x2="230" y2="330" />
                    <line x1="10" y1="110" x2="330" y2="110" />
                    <line x1="10" y1="230" x2="330" y2="230" />
                </svg>
                <button class="cell" data-row="0" data-col="0"></button>
                <button class="cell" data-row="0" data-col="1"></button>
                <button class="cell" data-row="0" data-col="2"></button>
                <button class="cell" data-row="1" data-col="0"></button>
                <button class="cell" data-row="1" data-col="1"></button>
                <button class="cell" data-row="1" data-col="2"></button>
                <button class="cell" data-row="2" data-col="0"></button>
                <button class="cell" data-row="2" data-col="1"></button>
                <button class="cell" data-row="2" data-col="2"></button>
            </div>
            <div class="game-panel">
                <form>
                    <label for="player-O-name">Player O Name:</label>
                    <input type="text" id="player-O-name" name="player-O-name" placeholder="Player O">
                    <label for="player-X-name">Player X Name:</label>
                    <input type="text" id="player-X-name" name="player-X-name" placeholder="Player X">
                    <button type="submit">PLAY</button>
                </form>
                <div class="game-console">
                    <!-- Log messages based on state of game -->
                </div>
            </div>
        </div>
    </main>
    <footer>
        Copyright © Marcos Vazquez 2026
    </footer>
    <script src="tic-tac-toe.js"></script>
</body>
</html>
